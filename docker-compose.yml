# Self-host stack: just the bot + a SQLite volume.

services:
  honeybot:
    build:
      context: .
      dockerfile: crates/honeybot/Dockerfile
    image: honeybot:dev
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN in .env}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - honeybot-data:/data

volumes:
  honeybot-data:
